services:
  tasknotetaker:
    build: .
    image: tasknotetaker:local
    container_name: tasknotetaker
    environment:
      - TASKNOTETAKER_USER_EMAIL=admin@example.com
      - TASKNOTETAKER_USER_PASSWORD=${TASKNOTETAKER_USER_PASSWORD}
      - TASKNOTETAKER_SESSION_SECRET=${TASKNOTETAKER_SESSION_SECRET}
      - TASKNOTETAKER_ALLOWED_ORIGINS=http://localhost:3002
      - TASKNOTETAKER_TRUST_PROXY=false
      - TASKNOTETAKER_UPLOAD_PATH=/app/backend/uploads
      - RATE_LIMITING_ENABLED=${RATE_LIMITING_ENABLED:-true}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      # Runtime UID/GID configuration - set these to match your host user/group
      - PUID=1001
      - PGID=1001
    volumes:
      - ./tasknotetaker_db:/app/backend/db
      - ./uploads:/app/backend/uploads
    ports:
      - "3002:3002"
    restart: unless-stopped
